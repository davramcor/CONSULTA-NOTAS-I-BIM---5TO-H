<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consulta de Notas - 5H</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #eef3f8;
      color: #10233f;
    }

    .contenedor {
      max-width: 960px;
      margin: 40px auto;
      background: #ffffff;
      padding: 32px 30px;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
    }

    h1 {
      text-align: center;
      margin: 0 0 28px;
      font-size: 36px;
      color: #12223f;
    }

    .buscador {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
    }

    input {
      flex: 1;
      padding: 16px;
      font-size: 20px;
      border: 1px solid #c7d3e3;
      border-radius: 14px;
      outline: none;
    }

    input:focus {
      border-color: #2f64e4;
      box-shadow: 0 0 0 3px rgba(47, 100, 228, 0.12);
    }

    button {
      padding: 0 30px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 14px;
      color: white;
      background: #2f64e4;
      cursor: pointer;
    }

    button:hover {
      background: #244fc0;
    }

    .mensaje {
      display: none;
      padding: 16px;
      margin-bottom: 20px;
      border-radius: 12px;
      background: #fff4e5;
      border: 1px solid #ffd08a;
      color: #7a4a00;
      font-size: 18px;
    }

    .datos-estudiante {
      display: none;
      background: #f8fafc;
      border: 1px solid #dfe5ee;
      border-radius: 16px;
      padding: 24px 22px;
      margin-bottom: 20px;
    }

    .datos-estudiante h2 {
      margin: 0 0 6px;
      font-size: 26px;
      color: #12223f;
    }

    .datos-estudiante p {
      margin: 0;
      font-size: 20px;
      color: #31415c;
    }

    .tarjetas {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .tarjeta {
      border-radius: 14px;
      padding: 22px 20px;
      min-height: 220px;
    }

    .indaga {
      background: #edf5ff;
      border: 1px solid #add0ff;
    }

    .explica {
      background: #ecfff3;
      border: 1px solid #a9ecc3;
    }

    .disena {
      background: #fbf4ff;
      border: 1px solid #dfc2ff;
    }

    .tarjeta h3 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .indaga h3 {
      color: #1847c7;
    }

    .explica h3 {
      color: #05602e;
    }

    .disena h3 {
      color: #6b1eb5;
    }

    .tarjeta p {
      margin: 8px 0;
      font-size: 20px;
      line-height: 1.35;
      color: #000;
    }

    .promedio {
      margin-top: 16px !important;
      font-weight: bold;
    }

    @media (max-width: 800px) {
      .contenedor {
        margin: 18px;
        padding: 24px 18px;
      }

      h1 {
        font-size: 30px;
      }

      .buscador {
        flex-direction: column;
      }

      button {
        padding: 16px;
      }

      .tarjetas {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="contenedor">
    <h1>Consulta de Notas</h1>

    <div class="buscador">
      <input id="dni" type="text" placeholder="Ingrese su DNI" maxlength="8" autocomplete="off" />
      <button onclick="consultarNotas()">Consultar</button>
    </div>

    <div id="mensaje" class="mensaje"></div>

    <section id="datosEstudiante" class="datos-estudiante">
      <h2 id="nombreEstudiante"></h2>
      <p id="dniEstudiante"></p>
    </section>

    <section id="tarjetas" class="tarjetas">
      <article class="tarjeta indaga">
        <h3>Competencia INDAGA</h3>
        <p>Informe laboratorio 1: <span id="lab1"></span></p>
        <p>Informe laboratorio 2: <span id="lab2"></span></p>
        <p class="promedio">Promedio: <span id="promIndaga"></span></p>
      </article>

      <article class="tarjeta explica">
        <h3>Competencia EXPLICA</h3>
        <p>Evaluación escrita 1: <span id="eval1"></span></p>
        <p>Evaluación escrita 2: <span id="eval2"></span></p>
        <p>Trabajo en clase: <span id="trabajo"></span></p>
        <p class="promedio">Promedio: <span id="promExplica"></span></p>
      </article>

      <article class="tarjeta disena">
        <h3>Competencia DISEÑA</h3>
        <p>Prototipo: <span id="prototipo"></span></p>
        <p class="promedio">Promedio: <span id="promDisena"></span></p>
      </article>
    </section>
  </main>

    function valor(estudiante, columna) {
      return estudiante[columna] && estudiante[columna].trim() !== "" ? estudiante[columna] : "-";
    }

    function consultarNotas() {
      const dniIngresado = document.getElementById("dni").value.trim();
      const mensaje = document.getElementById("mensaje");
      const datosEstudiante = document.getElementById("datosEstudiante");
      const tarjetas = document.getElementById("tarjetas");

      mensaje.style.display = "none";
      datosEstudiante.style.display = "none";
      tarjetas.style.display = "none";

      if (dniIngresado === "") {
        mensaje.textContent = "Ingrese un DNI.";
        mensaje.style.display = "block";
        return;
      }

      const estudiante = estudiantes.find(e => e["DNI"].trim() === dniIngresado);

      if (!estudiante) {
        mensaje.textContent = "No se encontró ningún estudiante con ese DNI.";
        mensaje.style.display = "block";
        return;
      }

      document.getElementById("nombreEstudiante").textContent = valor(estudiante, "APELLIDOS Y NOMBRES");
      document.getElementById("dniEstudiante").textContent = "DNI: " + valor(estudiante, "DNI");

      document.getElementById("lab1").textContent = valor(estudiante, "INFORME LABORATORIO 1");
      document.getElementById("lab2").textContent = valor(estudiante, "INFORME LABORATORIO 2");
      document.getElementById("promIndaga").textContent = valor(estudiante, "PROMEDIO COMPETENCIA INDAGA");

      document.getElementById("eval1").textContent = valor(estudiante, "EVALUACIÓN ESCRITA 1");
      document.getElementById("eval2").textContent = valor(estudiante, "EVALUACION ESCRITA 2");
      document.getElementById("trabajo").textContent = valor(estudiante, "TRABAJO EN CLASE ");
      document.getElementById("promExplica").textContent = valor(estudiante, "PROMEDIO COMPETENCIA EXPLICA");

      document.getElementById("prototipo").textContent = valor(estudiante, "PROTOTIPO");
      document.getElementById("promDisena").textContent = valor(estudiante, "PROMEDIO COMPETENCIA DISEÑA");

      datosEstudiante.style.display = "block";
      tarjetas.style.display = "grid";
    }

    document.getElementById("dni").addEventListener("keyup", function(event) {
      if (event.key === "Enter") {
        consultarNotas();
      }
    });
